name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    uses: provide-io/ci-tooling/.github/workflows/python-release.yml@main
    with:
      python-version: '3.11'
      run-tests: true
      test-repository: false
      # Disable parallel tests to avoid pytest-xdist worker communication issues
      parallel-tests: false
      publish-testpypi: ${{ inputs.publish-testpypi || false }}
      publish-pypi: ${{ inputs.publish-pypi || false }}
    secrets: inherit
