name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pytest --no-header -q
      - run: uv run python -m build
      - run: uv run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
      - name: Generate Python SBOM
        run: |
          uv run pip install cyclonedx-bom
          uv run cyclonedx-py environment --output-format json -o sbom-python.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.cdx.json

  publish-testpypi:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/provide-testkit
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for TestPyPI propagation
        run: sleep 30
      - name: Install from TestPyPI and verify
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "provide-testkit==${{ steps.version.outputs.version }}"
          python -c "import provide.testkit; print('OK')"

  publish-pypi:
    needs: [build, verify-testpypi]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/provide-testkit
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  sign-and-upload:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sbom-python
          path: sbom
      - uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: dist/*.whl dist/*.tar.gz
      - name: Upload artifacts and signatures to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.whl dist/*.tar.gz dist/*.sigstore.json \
            sbom/sbom-python.cdx.json \
            --clobber
